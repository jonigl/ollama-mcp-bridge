name: 'Build and Push Docker Image'
description: |
  This workflow runs on every release.
  It builds and publishes a new Docker image and pushes that image to the GitHub Container Registry (ghcr.io)

on:
  release:
    types:
      - created

  workflow_dispatch:
    inputs:
      tag_name:
        type: string
        required: true
        description: 'Name of the tag to use for publish (ex. v1.0.0-test)'

env:
  IMAGE_NAME: 'ollama-mcp-bridge'

jobs:
  build-and-push:
    name: 'Build and Push Multi-Arch Image'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 'Set up QEMU'
        uses: docker/setup-qemu-action@v3

      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@v3

      - name: 'Docker login'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Docker metadata'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=raw,value=${{ github.event.release.tag_name || inputs.tag_name }}
            type=sha,format=long

      - name: 'Build and push'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ github.event.release.tag_name || inputs.tag_name }}
          provenance: false # Prevents unknown/unknown Attestation Manifests
          sbom: false # Prevents SBOM Manifests
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify-manifest:
    name: 'Verify manifest'
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: 'Verify'
        run: |
          IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${{ env.IMAGE_NAME }}:latest
          OUTPUT=$(docker buildx imagetools inspect $IMAGE)
          echo "$OUTPUT"
          for arch in amd64 arm64; do
            if ! echo "$OUTPUT" | grep -q "$arch"; then
              echo -e "\x1b[1;31mPlatform $arch is missing in manifest."
              exit 1
            fi
          done
          echo -e "\x1b[1;32mAll expected platforms found in manifest."
